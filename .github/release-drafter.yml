name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Breaking Changes"
    labels:
      - breaking
  - title: "Features"
    labels:
      - feature
      - enhancement
  - title: "Bug Fixes"
    labels:
      - fix
      - bug
  - title: "Documentation"
    labels:
      - documentation
      - docs
  - title: "Maintenance"
    labels:
      - chore
      - ci
  - title: "Dependency Updates"
    labels:
      - dependencies

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - fix
      - bug
      - documentation
      - docs
      - dependencies
      - chore
      - ci
  default: patch

autolabeler:
  - label: docs
    branch: /docs?\/.*/
    title: /docs?/i
    files:
      - "docs/**"
      - "**/*.md"
  - label: bug
    branch: /fix\/.*/
    title: /fix/i
  - label: feature
    branch: /feat(ure)?\/.*/
    title: /feat(ure)?/i
  - label: chore
    branch: /chore\/.*/
  - label: ci
    files:
      - ".github/**"
  - label: dependencies
    branch: /dependabot\/.*/
    files:
      - "Cargo.toml"
      - "Cargo.lock"

exclude-contributors:
  - dependabot
  - github-actions[bot]

exclude-labels:
  - skip-changelog

template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
